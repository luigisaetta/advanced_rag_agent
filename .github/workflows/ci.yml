name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  quality:
    runs-on: macos-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest-cov fastmcp

      - name: Prepare CI private config placeholder
        run: |
          if [ ! -f config_private.py ]; then
            cp config_private_template.py config_private.py
          fi

      - name: Black (check)
        run: black --check .

      - name: Pylint (errors only, blocking)
        run: |
          py_files=()
          while IFS= read -r file; do
            py_files+=("$file")
          done < <(find . -type f -name "*.py" -not -path "*/.*/*" | sed 's|^\./||')
          if [ "${#py_files[@]}" -eq 0 ]; then
            echo "No Python files found."
            exit 0
          fi
          pylint --errors-only "${py_files[@]}"

      - name: Pylint (full report, non-blocking)
        continue-on-error: true
        run: |
          py_files=()
          while IFS= read -r file; do
            py_files+=("$file")
          done < <(find . -type f -name "*.py" -not -path "*/.*/*" | sed 's|^\./||')
          if [ "${#py_files[@]}" -eq 0 ]; then
            echo "No Python files found."
            exit 0
          fi
          pylint "${py_files[@]}"

      - name: Pytest with coverage
        run: pytest --cov=agent --cov=core --cov-report=term-missing --cov-fail-under=70
